  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,

      color: #0f172a;
      background: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f8fafc;
    }
    header {
      padding: 24px clamp(18px, 4vw, 52px) 16px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.15;
    }
    .subtitle {
      margin: 0;
      max-width: 1000px;
      color: #475569;
      line-height: 1.5;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: 650;
      border: 1px solid #bfdbfe;
    }
    main {
      padding: 18px clamp(12px, 2vw, 28px) 40px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #e2e8f0;
      background: #ffffff;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #0f172a;
      border-radius: 9px;
      padding: 8px 11px;
      cursor: pointer;
      font-weight: 650;
    }
    button:hover {
      background: #f1f5f9;
    }
    .hint {
      color: #64748b;
      font-size: 13px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      padding: 12px 14px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 12px;
      background: #f8fafc;
    }
    .legend-title {
      width: 100%;
      color: #334155;
      font-weight: 750;
      margin-bottom: 2px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    #viewport {
      width: 100%;
      height: 76vh;
      min-height: 620px;
      overflow: auto;
      background: #ffffff;
      overscroll-behavior: contain;
    }
    #grafico {
      width: 4200px;
      height: 9284px;
    }
    .details-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      margin-top: 16px;
    }
    .record-card, details {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
    }
    .record-card h2 {
      margin: 0 0 10px;
      font-size: 17px;
    }
    #record-detail {
      color: #334155;
      line-height: 1.55;
    }
    #record-detail dl {
      display: grid;
      grid-template-columns: minmax(150px, 210px) minmax(0, 1fr);
      gap: 7px 12px;
      margin: 0;
    }
    #record-detail dt {
      font-weight: 700;
      color: #0f172a;
    }
    #record-detail dd {
      margin: 0;
      overflow-wrap: anywhere;
    }
    summary {
      cursor: pointer;
      font-weight: 750;
    }
    .table-wrap {
      margin-top: 12px;
      max-height: 520px;
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 9px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 8px 9px;
      border-bottom: 1px solid #e2e8f0;
      border-right: 1px solid #e2e8f0;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #e2e8f0;
      color: #0f172a;
    }
    tr[data-duplicate="true"] td {
      background: #fff7ed;
    }
    code {
      overflow-wrap: anywhere;
      word-break: break-all;
    }
    @media (max-width: 700px) {
      #viewport {
        height: 68vh;
        min-height: 500px;
      }
      #record-detail dl {
        grid-template-columns: 1fr;
      }
      #record-detail dt {
        margin-top: 5px;
      }
    }
  </style>
</head>

      legend.appendChild(item);
    }

    const duplicateRows = new Set(
      verification.duplicatasExatasPreservadas.flatMap(
        (group) => group.linhasExcel
      )
    );
    const auditBody = document.getElementById("audit-body");
    if (auditBody) {
      const fragment = document.createDocumentFragment();
      for (const row of sourceRows) {
        const tr = document.createElement("tr");
        tr.dataset.duplicate = String(duplicateRows.has(row.linhaExcel));
        const values = [
          row.linhaExcel,
          row["Categoria de Dados"],
          row["Categoria"],
          row["Campo de Dados"],
          row["Categorização"],
        ];
        for (const value of values) {
          const td = document.createElement("td");
          td.textContent = value;
          tr.appendChild(td);
        }
        fragment.appendChild(tr);
      }
      auditBody.appendChild(fragment);
    }

    const goTopButton = document.getElementById("go-top");
    if (goTopButton) {
      goTopButton.addEventListener("click", () => {
        document.getElementById("viewport").scrollTo({
          top: 0,
          left: 0,
          behavior: "smooth",
        });
      });
    }

    const downloadJsonButton = document.getElementById("download-json");
    if (downloadJsonButton) {
      downloadJsonButton.addEventListener("click", () => {
      const payload = {
        metadata: {
          arquivoFonte: "API de Portabilidade de Dados (1).xlsx",
          planilhaFonte: "Planilha1",
          intervaloFonte: "A1:D212",
          sha256DosRegistros: "bf50e346b57a06dbb199302eb8f4450fd06de4c69d310770a59584a7b8ba6b37",
        },
        registrosOriginais: sourceRows,
        treegraphNodes: treeNodes,
        verificacao: verification,
      };
      const blob = new Blob(
        [JSON.stringify(payload, null, 2)],
        { type: "application/json;charset=utf-8" }
      );
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "treegraph_portabilidade_dados.json";
      anchor.click();
      URL.revokeObjectURL(url);
      });
    }
  </script>
</body>
</html>
